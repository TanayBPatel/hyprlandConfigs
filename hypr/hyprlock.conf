background {
    monitor =
    path = ~/Pictures/wallpapers/wall.jpg
    blur_passes = 3
    blur_size = 6
}

general {
    hide_cursor = true
}

input-field {
    monitor =
    size = 260, 50
    outline_thickness = 3

    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true

    outer_color = rgb(89b4fa)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)

    fade_on_empty = false
    placeholder_text = Password...
    hide_input = false

    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(cdd6f4)

    font_size = 80
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgb(a6adc8)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign = center
    valign = center
}
